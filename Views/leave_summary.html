<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Details</title>

    <link rel="stylesheet" href="../Public/Css/leaveSummary.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

<div class="container">

    <div class="leave-details-card">

        <h2>Leave Details</h2>

        <div class="details-grid">

            <div class="detail-item">
                <i class="fas fa-calendar-alt"></i>
                <span class="label">Start Date:</span>
                <span class="value">2026-04-25</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-calendar-check"></i>
                <span class="label">End Date:</span>
                <span class="value">2026-04-28</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-comment"></i>
                <span class="label">Reason:</span>
                <span class="value">Family Emergency</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-tag"></i>
                <span class="label">Type:</span>
                <span class="value">Annual Leave</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-clock"></i>
                <span class="label">Days:</span>
                <span class="value">4</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-calendar-plus"></i>
                <span class="label">Request Date:</span>
                <span class="value">2026-04-20</span>
            </div>

            <div class="detail-item">
                <i class="fas fa-info-circle"></i>
                <span class="label">Status:</span>
                <span class="status approved">Approved</span>
            </div>

        </div>

        <div class="actions">
            <a href="/EALMS/dashboard" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

    </div>

</div>

</body>
</html>
