<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- FIXED PATH -->
    <link rel="stylesheet" href="../Public/Css/adminFinal.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <!-- FIXED PATH -->
        <img src="../Public/Images/EALMS Logo.png" style="width:160px;" alt="EALMS Logo">
    </div>

    <nav>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li class="active"><a href="settings.html">Settings</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </nav>

</div>

<!-- TOP HEADER -->
<div class="top-header">

    <div class="top-header-left">
        <h2 class="page-title">Settings</h2>
    </div>

    <div class="top-header-right">
        <i class="fas fa-bell header-icon"></i>
        <div class="avatar">A</div>
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- LEFT COLUMN -->
    <div class="left-column">

        <!-- PROFILE SETTINGS -->
        <section class="post-section">

            <h2>Profile Settings</h2>

            <form onsubmit="return saveProfile()">

                <label>Full Name</label>
                <input type="text" id="name" value="Admin Name" required>

                <label>Email</label>
                <input type="email" id="email" value="admin@email.com" required>

                <label>Username</label>
                <input type="text" value="admin" required>

                <button type="submit">
                    <i class="fas fa-save"></i> Save Profile
                </button>

            </form>

        </section>

        <!-- PASSWORD SETTINGS -->
        <section class="post-section">

            <h2>Change Password</h2>

            <form onsubmit="return changePassword()">

                <label>Current Password</label>
                <input type="password" id="currentPass" required>

                <label>New Password</label>
                <input type="password" id="newPass" required>

                <label>Confirm New Password</label>
                <input type="password" id="confirmPass" required>

                <button type="submit">
                    <i class="fas fa-lock"></i> Update Password
                </button>

            </form>

        </section>

        <!-- SYSTEM SETTINGS -->
        <section class="post-section">

            <h2>System Preferences</h2>

            <form onsubmit="return saveSettings()">

                <label>
                    <input type="checkbox" checked>
                    Enable Email Notifications
                </label>

                <label>
                    <input type="checkbox">
                    Enable SMS Notifications
                </label>

                <label>
                    <input type="checkbox" checked>
                    Auto-approve Leave Requests
                </label>

                <button type="submit">
                    <i class="fas fa-cog"></i> Save Preferences
                </button>

            </form>

        </section>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-column">

        <div class="dashboard-container">

            <h1 class="dashboard-title">Account</h1>

            <div class="summary-card">
                <h3>Status</h3>
                <p><strong>Role:</strong> Admin</p>
                <p><strong>Account:</strong> Active</p>
            </div>

            <div class="summary-card">
                <h3>Danger Zone</h3>

                <button onclick="deleteAccount()" style="background:#dc3545;">
                    <i class="fas fa-trash"></i> Deactivate Account
                </button>
            </div>

        </div>

    </div>

</div>

<!-- JS -->
<script>
function saveProfile() {
    let email = document.getElementById("email").value;

    if (!email.includes("@")) {
        alert("Enter valid email");
        return false;
    }

    alert("Profile updated successfully ✅");
    return false;
}

function changePassword() {
    let newPass = document.getElementById("newPass").value;
    let confirmPass = document.getElementById("confirmPass").value;

    if (newPass.length < 4) {
        alert("Password must be at least 4 characters");
        return false;
    }

    if (newPass !== confirmPass) {
        alert("Passwords do not match");
        return false;
    }

    alert("Password updated successfully 🔒");
    return false;
}

function saveSettings() {
    alert("Settings saved ⚙️");
    return false;
}

function deleteAccount() {
    let confirmDelete = confirm("Are you sure you want to deactivate your account?");

    if (confirmDelete) {
        alert("Account deactivated ❌");
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
